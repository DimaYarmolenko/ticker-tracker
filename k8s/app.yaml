apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app: app
spec:
  # Must stay at 1: the app runs an in-process APScheduler (news/price/eval polls).
  # Extra replicas would double every poll and write duplicate rows.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      initContainers:
        # Wait for Postgres before the app's entrypoint runs `alembic upgrade head`.
        - name: wait-for-db
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER"; do
                echo "waiting for postgres at $POSTGRES_HOST:$POSTGRES_PORT..."
                sleep 2
              done
          envFrom:
            - secretRef:
                name: ticker-tracker-env
      containers:
        - name: app
          image: ticker-tracker:0.1.0
          # Image is pre-imported into containerd (no registry); must not be Always.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            # All config comes from the .env-sourced secret (see k8s/deploy.sh).
            - secretRef:
                name: ticker-tracker-env
          readinessProbe:
            httpGet:
              path: /tickers
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /tickers
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: app
  labels:
    app: app
spec:
  selector:
    app: app
  ports:
    - port: 80
      targetPort: 8000
