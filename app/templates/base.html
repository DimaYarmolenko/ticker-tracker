<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ticker Tracker{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/chart.umd.min.js"></script>
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  {% block content %}{% endblock %}
  <script>
    document.body.addEventListener("htmx:afterSwap", function (event) {
      if (event.target.id !== "sidebar") return;
      var active = document.getElementById("main-pane")?.dataset.activeTicker;
      if (!active) return;
      document.querySelectorAll(".ticker-row").forEach(function (row) {
        var btn = row.querySelector(".ticker-symbol");
        row.classList.toggle("is-selected", !!btn && btn.textContent.trim() === active);
      });
    });
  </script>
</body>
</html>
