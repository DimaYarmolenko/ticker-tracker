{% extends "base.html" %}

{% block content %}
<header class="topbar">
  <h1>Ticker Tracker</h1>
  <div class="topbar-user">
    <span class="user-email">{{ current_user.email }}</span>
    <form method="post" action="/logout" class="logout-form">
      <button type="submit">Sign out</button>
    </form>
  </div>
</header>

<main class="layout">
  {% include "_tickers.html" %}

  <div id="main-pane" class="main-pane">
    <p class="empty">Select a ticker to see its chart and news.</p>
  </div>
</main>
{% endblock %}
